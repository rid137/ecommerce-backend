paths:
  /address:
    get:
      summary: Get all addresses for authenticated user
      description: Retrieves paginated list of addresses belonging to the authenticated user
      tags:
        - Addresses
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - in: query
          name: size
          schema:
            type: integer
            default: 10
          description: Number of addresses per page
      responses:
        "200":
          description: User addresses retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Address"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized - Invalid or missing token
        "500":
          description: Internal server error

    post:
      summary: Create a new address
      description: Creates a new address for the authenticated user
      tags:
        - Addresses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddressDTO"
      responses:
        "201":
          description: Address created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Address"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized - Invalid or missing token
        "500":
          description: Internal server error

  /addresses/{id}:
    get:
      summary: Get a single address by ID
      description: Retrieves a specific address by its ID
      tags:
        - Addresses
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Address ID
      responses:
        "200":
          description: Address retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Address"
        "401":
          description: Unauthorized - Invalid or missing token
        "404":
          description: Address not found
        "500":
          description: Internal server error

    put:
      summary: Update an address
      description: Updates an existing address with new information
      tags:
        - Addresses
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Address ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddressDTO"
      responses:
        "200":
          description: Address updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Address"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized - Invalid or missing token
        "404":
          description: Address not found
        "500":
          description: Internal server error

    delete:
      summary: Delete an address
      description: Deletes an existing address
      tags:
        - Addresses
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Address ID
      responses:
        "200":
          description: Address deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Address"
        "401":
          description: Unauthorized - Invalid or missing token
        "404":
          description: Address not found
        "500":
          description: Internal server error

  /addresses/{id}/default:
    patch:
      summary: Set address as default
      description: Sets a specific address as the default address for the authenticated user
      tags:
        - Addresses
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Address ID
      responses:
        "200":
          description: Address set as default successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Address"
        "401":
          description: Unauthorized - Invalid or missing token
        "404":
          description: Address not found
        "500":
          description: Internal server error

components:
  schemas:
    Address:
      type: object
      properties:
        _id:
          type: string
          description: Address ID
        userId:
          type: string
          description: User ID who owns this address
        street:
          type: string
          description: Street address
        city:
          type: string
          description: City name
        state:
          type: string
          description: State/Province name
        zipCode:
          type: string
          description: ZIP/Postal code
        country:
          type: string
          description: Country name
        isDefault:
          type: boolean
          description: Whether this is the default address
        createdAt:
          type: string
          format: date-time
          description: Address creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Address last update timestamp

    CreateAddressDTO:
      type: object
      required:
        - street
        - city
        - state
        - zipCode
        - country
      properties:
        street:
          type: string
          example: "123 Main Street"
          description: Street address
        city:
          type: string
          example: "New York"
          description: City name
        state:
          type: string
          example: "NY"
          description: State/Province name
        zipCode:
          type: string
          example: "10001"
          description: ZIP/Postal code
        country:
          type: string
          example: "United States"
          description: Country name
        isDefault:
          type: boolean
          example: false
          description: Whether this is the default address (optional, defaults to false)

    Pagination:
      type: object
      properties:
        currentPage:
          type: integer
          description: Current page number
        perPage:
          type: integer
          description: Number of items per page
        totalDocuments:
          type: integer
          description: Total number of documents
        totalPages:
          type: integer
          description: Total number of pages

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication
